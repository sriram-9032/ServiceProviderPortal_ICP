<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error - UAEID Onboarding</title>
    <style>
        body {
            background-color: #f8f9fa;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .error-card {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 450px;
            width: 90%;
        }
        .logo {
            max-width: 180px;
            margin-bottom: 20px;
        }
        .error-code {
            font-size: 72px;
            font-weight: bold;
            color: #2c3e50;
            margin: 0;
            line-height: 1;
        }
        h2 {
            color: #002d5b;
            font-size: 24px;
            margin: 10px 0;
        }
        p {
            color: #6c757d;
            font-size: 14px;
            margin-bottom: 30px;
        }
        .btn-home {
            background-color: #9B7236;
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            font-size: 14px;
            display: inline-block;
            transition: background 0.3s;
        }
        .btn-home:hover {
            background-color: #7d5a2b;
        }
    </style>
</head>
<body>

<div class="error-card">

    <div class="error-code" th:text="${status}">404</div>

    <h2 th:if="${status == 404}">Page Not Found</h2>
    <h2 th:if="${status == 403}">Access Denied</h2>
    <h2 th:if="${status == 401}">Unauthorized</h2>
    <h2 th:if="${status == 500}">Server Error</h2>
    <h2 th:if="${status != 404 and status != 403 and status != 401 and status != 500}">Unexpected Error</h2>

    <p th:text="${errorMessage}">Something went wrong with your request.</p>

    <a href="/" class="btn-home">GO BACK HOME</a>
</div>

</body>
</html>
